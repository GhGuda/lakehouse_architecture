name: Lakehouse CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest -q

  terraform-check:
    name: Terraform Format and Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [test, terraform-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_lakehouse_bucket_name: ${{ vars.LAKEHOUSE_BUCKET_NAME }}
      TF_VAR_detect_new_files_lambda_arn: ${{ vars.DETECT_NEW_FILES_LAMBDA_ARN }}
      TF_VAR_catalog_update_lambda_arn: ${{ vars.CATALOG_UPDATE_LAMBDA_ARN }}
      TF_VAR_athena_validation_lambda_arn: ${{ vars.ATHENA_VALIDATION_LAMBDA_ARN }}
      TF_VAR_archive_files_lambda_arn: ${{ vars.ARCHIVE_FILES_LAMBDA_ARN }}
      TF_VAR_failure_notifications_topic_arn: ${{ vars.FAILURE_NOTIFICATIONS_TOPIC_ARN }}
    defaults:
      run:
        working-directory: iac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
